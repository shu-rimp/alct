services:
  libretranslate:
    image: libretranslate/libretranslate
    restart: unless-stopped
    volumes:
      - lt-data-dev:/home/libretranslate/.local
    command: --load-only en,zh,ja,ko
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:5000/languages\")'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  alct-server:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - LIBRE_TRANSLATE_URL=http://libretranslate:5000/translate
    volumes:
      - ./models:/app/models
    depends_on:
      libretranslate:
        condition: service_healthy

volumes:
  lt-data-dev:
