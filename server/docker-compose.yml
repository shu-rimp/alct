services:
  libretranslate:
    image: libretranslate/libretranslate
    restart: unless-stopped
    volumes:
      - lt-data:/home/libretranslate/.local
    command: --load-only en,zh,ja,ko
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/languages || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  alct-server:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LIBRE_TRANSLATE_URL=http://libretranslate:5000/translate
    volumes:
      - ./models:/app/models
    depends_on:
      libretranslate:
        condition: service_healthy

volumes:
  lt-data:
