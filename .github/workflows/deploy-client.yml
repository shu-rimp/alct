name: Client CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-client.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Inject server token
        shell: pwsh
        run: |
          $file = "client/src/Core/BuildConstants.cs"
          (Get-Content $file) -replace '#{ALCT_SERVER_TOKEN}#', '${{ secrets.ALCT_SERVER_TOKEN }}' | Set-Content $file

      - name: Publish
        working-directory: client/src
        run: dotnet publish -c Release -r win-x64 --self-contained false -o ../../dist

      - uses: actions/upload-artifact@v4
        with:
          name: alct-client
          path: dist/
