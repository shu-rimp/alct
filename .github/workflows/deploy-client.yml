name: Client CI/CD

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Verify tag is on main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git fetch origin main
          git merge-base --is-ancestor $env:GITHUB_SHA origin/main
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tag '$env:GITHUB_REF_NAME' is not on main. Aborting release."
            exit 1
          }
          Write-Host "Verified: tag commit is on main."

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test Tests/AlctClient.Tests.csproj -c Release --nologo

      - name: Extract version from tag
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $version = if ($ref -match '^v') { $ref -replace '^v', '' } else { '0.0.0' }
          echo "VERSION=$version" >> $env:GITHUB_ENV

      - name: Inject build constants
        shell: pwsh
        run: |
          $file = "src/Core/BuildConstants.cs"
          (Get-Content $file) `
            -replace '#{ALCT_SERVER_URL}#',    '${{ secrets.ALCT_SERVER_URL }}'    `
            -replace '#{ALCT_SERVER_TOKEN}#',  '${{ secrets.ALCT_SERVER_TOKEN }}'  `
            -replace '#{ALCT_VERSION_TAG}#',   '${{ github.ref_name }}'            |
          Set-Content $file

      - name: Publish
        working-directory: src
        run: dotnet publish -c Release -r win-x64 --self-contained true -p:Version=${{ env.VERSION }} -p:PublishSingleFile=true -o ../dist

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ALCT.exe
          generate_release_notes: false
